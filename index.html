<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Моя 3D модель</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: #f2f2f2; }
    #controls {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      background: white; padding: 15px; border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    button {
      margin: 5px; padding: 10px 20px; cursor: pointer;
      font-size: 16px; background-color: #4CAF50; color: white;
      border: none; border-radius: 5px;
    }
    button:hover { background-color: #45a049; }
    model-viewer { width: 100vw; height: 100vh; background: #e0e0e0; }
  </style>
</head>
<body>

<div id="controls">
  <h3>Управление анимацией</h3>
  <button id="btn1">Анимация 1</button>
  <button id="btn2">Анимация 2</button>
  <p id="status" style="font-size: 14px; color: #666;">Загрузка...</p>
</div>


<model-viewer
  id="mv"
  src="Rouge (Prime)1.glb"
  camera-controls
  autoplay
>
</model-viewer>

<script>
// Простой код без сложностей
const mv = document.getElementById('mv');
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
const status = document.getElementById('status');

let animations = [];

// Когда модель загрузилась
mv.addEventListener('load', () => {
  animations = mv.availableAnimations;
  status.textContent = 'Найдено анимаций: ' + animations.length;
  console.log('Анимации:', animations);
  
  if (animations.length > 0) {
    mv.animationName = animations[0];
  }
});

// Если ошибка загрузки
mv.addEventListener('error', () => {
  status.textContent = '❌ Ошибка: файл модели не найден!';
});

// Кнопка 1
btn1.addEventListener('click', () => {
  if (animations.length >= 1) {
    mv.animationName = animations[0];
    mv.currentTime = 0;
    status.textContent = 'Играет: ' + animations[0];
  }
});

// Кнопка 2
btn2.addEventListener('click', () => {
  if (animations.length >= 2) {
    mv.animationName = animations[1];
    mv.currentTime = 0;
    status.textContent = 'Играет: ' + animations[1];
  }
});

// Автопереключение 
setInterval(() => {
  if (animations.length >= 2) {
    if (mv.animationName === animations[0]) {
      mv.animationName = animations[1];
    } else {
      mv.animationName = animations[0];
    }
    mv.currentTime = 0;
  }
}, 15000); // 15 секунды
</script>

</body>
</html>
</html>
