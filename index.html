<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Моя 3D модель с эффектами</title>
  
  <!-- ПОДКЛЮЧЕНИЕ БИБЛИОТЕК - ПРОВЕРЕННЫЙ ВАРИАНТ -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  
  <!-- Используем проверенные ссылки с правильными версиями -->
  <script type="module" src="https://esm.sh/@google/model-viewer@3.5.0"></script>
  <script type="module" src="https://esm.sh/@google/model-viewer-effects@3.5.0"></script>
  
  <style>
    body { margin: 0; font-family: Arial; background: #f2f2f2; }
    
    #controls {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      background: white; padding: 15px; border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    
    button {
      margin: 5px; padding: 10px 20px; cursor: pointer;
      font-size: 16px; background-color: #4CAF50; color: white;
      border: none; border-radius: 5px;
    }
    
    button:hover { background-color: #45a049; }
    
    /* Стили для чекбоксов */
    .effect-checkbox {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 15px;
      cursor: pointer;
    }
    
    .effect-checkbox input {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }
    
    h4 {
      margin: 15px 0 5px 0;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }
    
    model-viewer { 
      width: 100vw; 
      height: 100vh; 
      background: #e0e0e0; 
    }
  </style>
</head>
<body>

<div id="controls">
  <h3>Управление анимацией</h3>
  <button id="btn1">Анимация 1</button>
  <button id="btn2">Анимация 2</button>
  
  <h4>✨ Эффекты</h4>
  <label class="effect-checkbox">
    <input type="checkbox" id="togglePixelate"> Пикселизация
  </label>
  <label class="effect-checkbox">
    <input type="checkbox" id="toggleOutline"> Контур
  </label>
  
  <p id="status" style="font-size: 14px; color: #666;">Загрузка...</p>
</div>

<!-- Модель -->
<model-viewer
  id="mv"
  src="Rouge (Prime)1.glb"
  camera-controls
  autoplay
  style="width: 100%; height: 100vh;"
>
  <!-- Эффекты -->
  <effect-composer>
    <pixelate-effect id="pixelEffect" granularity="5" blend-mode="skip"></pixelate-effect>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
  </effect-composer>
</model-viewer>

<script>
const mv = document.getElementById('mv');
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
const status = document.getElementById('status');

// Эффекты
const pixelEffect = document.getElementById('pixelEffect');
const outlineEffect = document.getElementById('outlineEffect');
const togglePixelate = document.getElementById('togglePixelate');
const toggleOutline = document.getElementById('toggleOutline');

let animations = [];

// Когда модель загрузилась
mv.addEventListener('load', () => {
  animations = mv.availableAnimations;
  status.textContent = '✅ Модель загружена! Найдено анимаций: ' + animations.length;
  console.log('Анимации:', animations);
  
  if (animations.length > 0) {
    mv.animationName = animations[0];
  }
});

// Если ошибка загрузки
mv.addEventListener('error', (e) => {
  console.error('Ошибка загрузки модели:', e);
  status.textContent = '❌ Ошибка: файл модели не найден! Проверьте имя файла.';
});

// Кнопка 1
btn1.addEventListener('click', () => {
  if (animations.length >= 1) {
    mv.animationName = animations[0];
    mv.currentTime = 0;
    status.textContent = 'Играет: ' + animations[0];
  }
});

// Кнопка 2
btn2.addEventListener('click', () => {
  if (animations.length >= 2) {
    mv.animationName = animations[1];
    mv.currentTime = 0;
    status.textContent = 'Играет: ' + animations[1];
  }
});

// Автопереключение 
setInterval(() => {
  if (animations.length >= 2) {
    if (mv.animationName === animations[0]) {
      mv.animationName = animations[1];
    } else {
      mv.animationName = animations[0];
    }
    mv.currentTime = 0;
  }
}, 15000);

// Управление эффектами
togglePixelate.addEventListener('change', (event) => {
  pixelEffect.blendMode = event.target.checked ? 'default' : 'skip';
  status.textContent = event.target.checked ? '✅ Пикселизация включена' : '❌ Пикселизация выключена';
});

toggleOutline.addEventListener('change', (event) => {
  outlineEffect.blendMode = event.target.checked ? 'default' : 'skip';
  status.textContent = event.target.checked ? '✅ Контур включен' : '❌ Контур выключен';
});
</script>

</body>
</html>
