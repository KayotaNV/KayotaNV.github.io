<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Моя 3D модель с эффектами</title>
  
  <!-- САМЫЕ СТАБИЛЬНЫЕ ВЕРСИИ -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  
  <!-- ЯВНО УКАЗЫВАЕМ ВЕРСИИ -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.1.0/dist/model-viewer-module.js"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer-effects@3.1.0/dist/model-viewer-effects.js"></script>
  
  <style>
    body { margin: 0; font-family: Arial; background: #f2f2f2; }
    #controls {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      background: white; padding: 15px; border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    button {
      margin: 5px; padding: 10px 20px; cursor: pointer;
      font-size: 16px; background-color: #4CAF50; color: white;
      border: none; border-radius: 5px;
    }
    button:hover { background-color: #45a049; }
    .effect-btn { background-color: #ff5500; }
    .effect-btn.active { background-color: #ff2200; }
    h4 { margin: 10px 0 5px 0; }
    model-viewer { width: 100vw; height: 100vh; background: #e0e0e0; }
  </style>
</head>
<body>

<div id="controls">
  <h3>Управление анимацией</h3>
  <button id="btn1">Анимация 1</button>
  <button id="btn2">Анимация 2</button>
  
  <h4>✨ Эффекты</h4>
  <button id="outlineBtn" class="effect-btn">Контур</button>
  <button id="pixelBtn" class="effect-btn">Пикселизация</button>
  
  <p id="status" style="font-size: 14px; color: #666;">Загрузка...</p>
</div>

<model-viewer
  id="mv"
  src="Rouge (Prime)1.glb"
  camera-controls
  autoplay
>
  <effect-composer>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>
</model-viewer>

<script>
const mv = document.getElementById('mv');
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
const outlineBtn = document.getElementById('outlineBtn');
const pixelBtn = document.getElementById('pixelBtn');
const status = document.getElementById('status');

let animations = [];
let outlineActive = false;
let pixelActive = false;

mv.addEventListener('load', () => {
  animations = mv.availableAnimations || [];
  status.textContent = '✅ Загружено! Анимаций: ' + animations.length;
  
  if (animations.length > 0) {
    mv.animationName = animations[0];
  }
});

mv.addEventListener('error', () => {
  status.textContent = '❌ Ошибка загрузки';
});

btn1.addEventListener('click', () => {
  if (animations.length >= 1) {
    mv.animationName = animations[0];
    mv.currentTime = 0;
  }
});

btn2.addEventListener('click', () => {
  if (animations.length >= 2) {
    mv.animationName = animations[1];
    mv.currentTime = 0;
  }
});

// Эффекты
outlineBtn.addEventListener('click', () => {
  const effect = document.getElementById('outlineEffect');
  if (effect) {
    outlineActive = !outlineActive;
    effect.blendMode = outlineActive ? 'default' : 'skip';
    outlineBtn.classList.toggle('active', outlineActive);
  }
});

pixelBtn.addEventListener('click', () => {
  const effect = document.getElementById('pixelEffect');
  if (effect) {
    pixelActive = !pixelActive;
    effect.blendMode = pixelActive ? 'default' : 'skip';
    pixelBtn.classList.toggle('active', pixelActive);
  }
});
</script>

</body>
</html>
