<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Моя 3D модель с анимациями</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    #controls {
      position: fixed;      
      top: 20px;
      left: 20px;
      z-index: 10;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* Стили для кнопок */
    button {
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: #45a049;  
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #e0e0e0;
    }
  </style>
</head>

<body>

<div id="controls">
  <h3>Управление анимацией</h3>
  <button id="btn1">Анимация 1 (движение вверх)</button>
  <button id="btn2">Анимация 2 (вращение)</button>
  <p style="font-size: 14px; color: #666; margin-top: 10px;">
  </p>
</div>

<model-viewer
  id="mv"
  src="Rouge (Prime)1.glb"
  camera-controls        
  autoplay               
  animation-crossfade-duration="1000"  
>
</model-viewer>

<script>
(() => {
  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');

  let animations = [];

  mv.addEventListener('load', () => {
    animations = mv.availableAnimations;
    
    console.log('Анимации в модели:', animations);

    if (animations.length >= 1) {
      mv.animationName = animations[0];
      mv.play();
    }
  });

  btn1.addEventListener('click', () => {
    if (animations.length >= 1) {
      mv.animationName = animations[0];  
      mv.currentTime = 0;                 
      mv.play();
    } else {
      alert('Анимация 1 не найдена!');
    }
  });

  btn2.addEventListener('click', () => {
    if (animations.length >= 2) {
      mv.animationName = animations[1];  
      mv.currentTime = 0;                 
      mv.play();
    } else {
      alert('Анимация 2 не найдена! Проверьте, что в модели есть две анимации.');
    }
  });

  setInterval(() => {
    if (animations.length >= 2) {
      if (mv.animationName === animations[0]) {
        mv.animationName = animations[1];  
      } else {
        mv.animationName = animations[0];  
      }
      mv.play();  
    }
  }, 15 000);  // Каждые 3000 миллисекунд = 15 секунды

})();
</script>

</body>

</html>
